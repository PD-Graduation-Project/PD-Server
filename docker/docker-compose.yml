services:
  nginx:
    image: ${NGINX_IMAGE:-ghcr.io/pd-graduation-project/pd-server/pd-nginx:latest}
    # Remove build: block — CI builds this too
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy # Wait for app healthcheck, not just container start
    volumes:
      - uploads:/app/uploads
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3" # Was missing logging on nginx

  app:
    image: ${APP_IMAGE:-ghcr.io/pd-graduation-project/pd-server/pd-app:latest}
    # Remove build: block and target: — CI builds with correct target already
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-pduser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pdpassword}
      - POSTGRES_DB=${POSTGRES_DB:-pdserver}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy # Was service_started — redis has a healthcheck
      minio:
        condition: service_healthy # Was service_started — minio has a healthcheck
    volumes:
      - uploads:/app/uploads
      - app_logs:/app/logs
    entrypoint: ["python", "docker/entrypoint.py"]
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s # Give gunicorn time to boot before healthcheck starts failing
      retries: 3

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/pd-graduation-project/pd-server/pd-worker:latest}
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: prod
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-pduser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pdpassword}
      - POSTGRES_DB=${POSTGRES_DB:-pdserver}
      - GDRIVE_WEIGHTS_ID=1Svo25SRx7RZ7MW8m1abZerdv7zgypyHT
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - weights:/app/ml/_FINAL_SCRIPTS/weights
      - torch_cache:/home/workeruser/.cache/torch/hub/checkpoints
      - pip_cache:/home/workeruser/.cache/pip
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15.9-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pdserver}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pduser} -d ${POSTGRES_DB:-pdserver}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    env_file:
      - .env.docker
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:1.7.1
    profiles:
      - prod
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --interval
      - ${WATCHTOWER_INTERVAL:-300}
    environment:
      - DOCKER_API_VERSION=1.41
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/.docker/config.json:/config.json:ro
    restart: unless-stopped
    # Intentionally NO watchtower label — it must never update itself

networks:
  pd-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
  weights:
  torch_cache:
  minio_data:
  app_logs:
  nginx_logs:
  pip_cache:
