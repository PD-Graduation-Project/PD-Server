services:
  nginx:
    image: ${NGINX_IMAGE:-pd-server-nginx:local}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - app
    volumes:
      - uploads:/app/uploads
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true

  app:
    image: ${APP_IMAGE:-pd-server-app:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=pduser
      - POSTGRES_PASSWORD=pdpassword
      - POSTGRES_DB=pdserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - uploads:/app/uploads
      - app_logs:/app/logs
    entrypoint: ["python", "docker/entrypoint.py"]
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${WORKER_IMAGE:-pd-server-worker:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=pduser
      - POSTGRES_PASSWORD=pdpassword
      - POSTGRES_DB=pdserver
      - GDRIVE_WEIGHTS_ID=1Svo25SRx7RZ7MW8m1abZerdv7zgypyHT
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
      - weights:/app/ml/_FINAL_SCRIPTS/weights
      - torch_cache:/root/.cache/torch/hub/checkpoints
    # Download weights into the named volume on first start, then launch the worker
    command: >
      sh -c "
        cd /app/ml/_FINAL_SCRIPTS &&
        if [ -z \"$$(ls -A weights/*.pth 2>/dev/null)\" ]; then
          echo 'Downloading model weights...';
          gdown \"$$GDRIVE_WEIGHTS_ID\" --folder -O weights || { echo 'gdown failed'; exit 1; };
          echo 'Download complete, checking files:';
          ls -la weights/;
        else
          echo 'Weights already present, skipping download.';
          ls -la weights/;
        fi &&
        cd /app &&
        PYTHONPATH=/app rq worker ml
      "
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15.9-alpine
    environment:
      POSTGRES_USER: pduser
      POSTGRES_PASSWORD: pdpassword
      POSTGRES_DB: pdserver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pduser -d pdserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    env_file:
      - .env.docker
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1",
        ]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    profiles:
      - prod
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --interval
      - ${WATCHTOWER_INTERVAL:-30}
    environment:
      - DOCKER_API_VERSION=1.41
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/.docker/config.json:/config.json:ro
    restart: unless-stopped

networks:
  pd-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
  weights:
  torch_cache:
  minio_data:
  app_logs:
  nginx_logs:
