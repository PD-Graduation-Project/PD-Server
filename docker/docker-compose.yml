services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=pduser
      - POSTGRES_PASSWORD=pdpassword
      - POSTGRES_DB=pdserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
    entrypoint: ["python", "docker/entrypoint.py"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env.docker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=pduser
      - POSTGRES_PASSWORD=pdpassword
      - POSTGRES_DB=pdserver
      - GDRIVE_WEIGHTS_ID=1Svo25SRx7RZ7MW8m1abZerdv7zgypyHT
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads
      - weights:/app/ml/_FINAL_SCRIPTS/weights
      - torch_cache:/root/.cache/torch/hub/checkpoints
    # Download weights into the named volume on first start, then launch the worker
    command: >
      sh -c "
        cd /app/ml/_FINAL_SCRIPTS &&
        if [ -z \"$$(ls -A weights/*.pth 2>/dev/null)\" ]; then
          echo 'Downloading model weights...';
          gdown \"$$GDRIVE_WEIGHTS_ID\" --folder -O weights || { echo 'gdown failed'; exit 1; };
          echo 'Download complete, checking files:';
          ls -la weights/;
        else
          echo 'Weights already present, skipping download.';
          ls -la weights/;
        fi &&
        cd /app &&
        PYTHONPATH=/app rq worker ml
      "
    restart: unless-stopped

  postgres:
    image: postgres:15.9-alpine
    environment:
      POSTGRES_USER: pduser
      POSTGRES_PASSWORD: pdpassword
      POSTGRES_DB: pdserver
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pduser -d pdserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    env_file:
      - .env.docker
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  weights:
  torch_cache:
  minio_data:
