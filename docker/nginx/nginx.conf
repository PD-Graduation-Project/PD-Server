worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    map $request_uri $loggable_path {
        default 1;
        /health 0;
        /ready 0;
        /metrics 0;
    }

    map $status $loggable_status {
        ~^[45] 1;
        default 0;
    }

    map "$loggable_status:$loggable_path" $loggable {
        default 0;
        "1:1" 1;
    }

    access_log /var/log/nginx/access.log json;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Per-IP limits (tuned to avoid impacting ESP32 stream/heartbeat)
    limit_req_zone $binary_remote_addr zone=global_api_rate:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=esp32_heartbeat_rate:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;
    limit_req_status 429;
    limit_conn_status 429;

    upstream app {
        server app:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        include /etc/nginx/blocklist.conf;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        include /etc/nginx/blocklist.conf;

        # Internal-only: readiness check (for orchestrators/K8s)
        location = /ready {
            include /etc/nginx/blocklist.conf;

            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ESP32 SSE stream: keep open, disable buffering, avoid request throttling
        location = /api/esp32/stream {
            limit_conn per_ip_conn 100;
            proxy_http_version 1.1;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            send_timeout 1h;
        }

        # ESP32 heartbeat: mild per-IP throttling, safe for brief retries
        location = /api/esp32/heartbeat {
            limit_req zone=esp32_heartbeat_rate burst=60 nodelay;
            limit_conn per_ip_conn 100;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth routes: stricter limits to reduce brute-force pressure
        location ^~ /api/auth/ {
            limit_req zone=auth_rate burst=20 nodelay;
            limit_conn per_ip_conn 20;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=global_api_rate burst=120 nodelay;
            limit_conn per_ip_conn 40;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;
        include /etc/nginx/blocklist.conf;

        include /etc/nginx/blocklist.conf;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        # Internal-only: readiness check (for orchestrators/K8s)
        location = /ready {
            include /etc/nginx/blocklist.conf;

            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ESP32 SSE stream: keep open, disable buffering, avoid request throttling
        location = /api/esp32/stream {
            limit_conn per_ip_conn 100;
            proxy_http_version 1.1;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            send_timeout 1h;
        }

        # ESP32 heartbeat: mild per-IP throttling, safe for brief retries
        location = /api/esp32/heartbeat {
            limit_req zone=esp32_heartbeat_rate burst=60 nodelay;
            limit_conn per_ip_conn 100;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth routes: stricter limits to reduce brute-force pressure
        location ^~ /api/auth/ {
            limit_req zone=auth_rate burst=20 nodelay;
            limit_conn per_ip_conn 20;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=global_api_rate burst=120 nodelay;
            limit_conn per_ip_conn 40;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
