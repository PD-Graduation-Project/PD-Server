services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    volumes:
      - ../ml:/app/ml
      - ../app:/app/app
      - ../requirements.txt:/app/requirements.txt:ro
      - uploads:/app/uploads
      - app_logs:/app/logs
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONPATH=/app
    restart: "no"
    ports:
      - "5000:5000"
    labels:
      - com.centurylinklabs.watchtower.enable=false

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    volumes:
      - ../ml:/app/ml
      - ../app:/app/app
      - ../requirements.txt:/app/requirements.txt:ro
      - uploads:/app/uploads
      - weights:/app/ml/_FINAL_SCRIPTS/weights
      - torch_cache:/home/workeruser/.cache/torch/hub/checkpoints
    restart: "no"
    labels:
      - com.centurylinklabs.watchtower.enable=false

  nginx:
    build: # ← was missing, needed for local dev
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: "no"
    labels:
      - com.centurylinklabs.watchtower.enable=false

  postgres:
    ports:
      - "5432:5432"
    restart: "no"

  redis:
    ports:
      - "6379:6379"
    restart: "no"

  minio:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: "no"
