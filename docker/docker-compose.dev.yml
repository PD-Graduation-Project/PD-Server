services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      target: dev # see Dockerfile change below (optional)
    volumes:
      - ../:/app # live source mount
      - uploads:/app/uploads
      - app_logs:/app/logs
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONPATH=/app
    restart: "no"
    ports:
      - "5000:5000" # hit app directly without going through nginx
    labels:
      - com.centurylinklabs.watchtower.enable=false

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    volumes:
      - ../:/app
      - uploads:/app/uploads
      - weights:/app/ml/_FINAL_SCRIPTS/weights
      - torch_cache:/root/.cache/torch/hub/checkpoints # back to /root since user: root
    user: root
    restart: "no"
    labels:
      - com.centurylinklabs.watchtower.enable=false

  nginx:
    restart: "no"
    labels:
      - com.centurylinklabs.watchtower.enable=false
    # Optional: comment nginx out entirely in dev and hit :5000 directly

  postgres:
    ports:
      - "5432:5432"
    restart: "no"

  redis:
    ports:
      - "6379:6379"
    restart: "no"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: "no"
