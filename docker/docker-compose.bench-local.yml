services:
  app:
    network_mode: "host"
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_USER=pduser
      - POSTGRES_PASSWORD=pdpassword
      - POSTGRES_DB=pdserver
      - DATABASE_URL=postgresql://pduser:pdpassword@localhost:5432/pdserver
      - REDIS_URL=redis://localhost:6379/0
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - RATE_LIMIT_ENABLED=false
      - STORAGE_BACKEND=local
      - LOG_LEVEL=warning
      - GUNICORN_WORKERS=4
    command:
      - gunicorn
      - "--workers=4"
      - "--worker-class=gevent"
      - "--bind=0.0.0.0:5000"
      - "--preload"
      - "--log-level=warning"
      - "app:create_app()"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
