server:
  http_listen_port: 9080
  grpc_listen_port: 9081

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: pd-server-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: pd-server
          service: app
          __path__: /app/logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            request_id: request_id
      - labels:
          level:

  - job_name: nginx-access
    static_configs:
      - targets: [localhost]
        labels:
          job: pd-server
          service: nginx
          log_type: access
          __path__: /var/log/nginx/pd_access.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            remote_addr: remote_addr
            method: method
            uri: uri
            status: status
            request_time: request_time
      - labels:
          method:
          status:

  - job_name: nginx-error
    static_configs:
      - targets: [localhost]
        labels:
          job: pd-server
          service: nginx
          log_type: error
          __path__: /var/log/nginx/pd_error.log

  - job_name: fail2ban
    static_configs:
      - targets: [localhost]
        labels:
          job: pd-server
          service: fail2ban
          log_type: security
          __path__: /var/log/fail2ban.log
    pipeline_stages:
      - regex:
          expression: '^\S+\s+\S+\s+\S+\s+\[(?P<pid>\d+)\]:\s+(?P<level>\S+)\s+\[(?P<jail>[^\]]+)\]\s+(?P<action>Found|Ban|Unban)\s+(?P<ip>\S+)'
      - labels:
          level:
          jail:
          action:
          ip:
