name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # Required to push to GHCR

jobs:
  build-app:
    name: Build App Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push App
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.app
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pd-app:latest
            ghcr.io/${{ github.repository_owner }}/pd-app:${{ github.sha }}
          cache-from: type=gha,scope=pd-app
          cache-to: type=gha,mode=max,scope=pd-app

  build-worker:
    name: Build Worker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.worker
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pd-worker:latest
            ghcr.io/${{ github.repository_owner }}/pd-worker:${{ github.sha }}
          cache-from: type=gha,scope=pd-worker
          cache-to: type=gha,mode=max,scope=pd-worker

  deploy:
    name: Signal Server to Pull
    runs-on: ubuntu-latest
    needs: [build-app, build-worker] # Only runs after BOTH images are built
    steps:
      - name: SSH and restart via Watchtower
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          port: 22
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Watchtower handles the pull automatically, but we trigger
            # an immediate check rather than waiting for its poll interval
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v ~/.docker/config.json:/config.json \
              containrrr/watchtower \
              --run-once \
              pd-app pd-worker
